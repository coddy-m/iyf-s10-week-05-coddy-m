<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 5 - Dark Mode</title>
    <style>
        body { font-family: Inter, sans-serif; padding: 40px; transition: all 0.4s; }
        .dark-mode { background: #1a1a2e; color: #eee; }
        button { padding: 14px 28px; font-size: 1.1rem; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Day 5: Dark Mode Toggle</h1>
    <p>Click the button to toggle dark mode. Preference is saved.</p>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
        }

        // Load saved preference
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
        }
    </script>
</body>
</html>
