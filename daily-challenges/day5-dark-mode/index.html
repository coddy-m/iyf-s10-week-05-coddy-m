<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 5: Dark Mode Toggle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🌙 Dark Mode Toggle</h1>
        
        <button id="toggleBtn" class="toggle-btn">
            <span class="icon">🌙</span>
            <span class="label">Enable Dark Mode</span>
        </button>
        
        <div class="content">
            <p>This is a demo paragraph. Toggle dark mode to see the transition animation!</p>
            <p>✨ The preference is saved automatically using localStorage.</p>
            <p>🔄 Refresh the page to see your setting persist.</p>
        </div>
        
        <div class="preview-cards">
            <div class="card">
                <h3>Card 1</h3>
                <p>Sample content card</p>
            </div>
            <div class="card">
                <h3>Card 2</h3>
                <p>Another sample card</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
