<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - Content Copier</title>
    <style>
        body { font-family: Inter, sans-serif; padding: 40px; }
        .box { border: 2px solid #667eea; padding: 20px; margin: 20px; border-radius: 12px; min-height: 150px; }
        button { padding: 12px 24px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Day 4: Content Copier</h1>
    
    <div style="display:flex; gap:40px;">
        <div class="box">
            <h3>Source</h3>
            <p id="source">This is the original content from the source box. You can copy it to the target box.</p>
        </div>
        
        <div class="box">
            <h3>Target</h3>
            <p id="target">Content will appear here...</p>
        </div>
    </div>

    <button onclick="copyContent()">Copy Content →</button>
    <button onclick="clearTarget()">Clear Target</button>

    <script>
        function copyContent() {
            const sourceText = document.getElementById("source").textContent;
            document.getElementById("target").textContent = sourceText;
        }
        
        function clearTarget() {
            document.getElementById("target").textContent = "Content will appear here...";
        }
    </script>
</body>
</html>
