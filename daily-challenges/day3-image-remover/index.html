<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 3: Image Remover</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        .controls {
            margin-bottom: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        #removeBtn { background: #ef476f; color: white; }
        #toggleBtn { background: #ffd166; color: #333; }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }
        .image-grid img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .image-grid img.hidden {
            opacity: 0;
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <h1>🖼️ Image Remover Challenge</h1>
    
    <div class="controls">
        <button id="removeBtn">Remove All Images</button>
        <button id="toggleBtn">Toggle Hide/Show</button>
    </div>
    
    <div class="image-grid">
        <img src="https://picsum.photos/200/200?random=1" alt="Random 1">
        <img src="https://picsum.photos/200/200?random=2" alt="Random 2">
        <img src="https://picsum.photos/200/200?random=3" alt="Random 3">
        <img src="https://picsum.photos/200/200?random=4" alt="Random 4">
        <img src="https://picsum.photos/200/200?random=5" alt="Random 5">
        <img src="https://picsum.photos/200/200?random=6" alt="Random 6">
    </div>
    
    <script src="script.js"></script>
</body>
</html>
