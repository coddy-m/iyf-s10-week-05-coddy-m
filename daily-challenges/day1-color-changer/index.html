<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 1: Color Changer</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; text-align: center; }
        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); }
        h1, h2, h3 { transition: color 0.3s ease; }
    </style>
</head>
<body>
    <h1>🎨 Color Changer Challenge</h1>
    <h2>Click the button below</h2>
    <h3>Watch the headings change!</h3>
    
    <button id="colorBtn">Change Colors</button>
    
    <script src="script.js"></script>
</body>
</html>
